# Codex via ChatGPT SUBSCRIPTION — FULL set (229 CVEs).
# Usage:  cp config.subscription.example.yaml config.yaml   (config.yaml is git-ignored)
#         codex login        # creates ~/.codex/auth.json on this machine
#         bash shells/run_infer.sh
agent: codex
model: gpt-5.5
reasoning: xhigh               # low|medium|high|xhigh   (codex has NO "max")
auth:
  method: subscription
  credentials:
    # EASIEST: point at your host auth.json (created by `codex login`). The runner
    # seeds this live file into each container at run time, so token refreshes are
    # picked up automatically and nothing secret lives in the config.
    auth_json_path: ~/.codex/auth.json
    #
    # --- OR inline the full blob instead of a path (paste ~/.codex/auth.json here):
    # auth_json:
    #   auth_mode: chatgpt
    #   tokens:
    #     id_token: REPLACE_ME
    #     access_token: REPLACE_ME
    #     refresh_token: REPLACE_ME
    #     account_id: REPLACE_ME
run:
  dataset: dataset.jsonl       # full set (229 CVEs)
  outputs_root: ./outputs/full
  strategy: default
  max_workers: 8               # EC2/GCP native amd64: tune to instance RAM (~1-2 GB/CVE) + rate limit
  timeout: 45m
  agent_timeout: 30m
  docker_platform: null        # null = native (Linux amd64). Use linux/amd64 ONLY on Apple Silicon.
